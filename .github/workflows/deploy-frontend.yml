name: Deploy Frontend to S3

on:
  push:
    branches:
      - main # O el nombre de tu rama principal (master/main)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Instalar y Compilar
        run: |
          npm install
          npm run build

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets::AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets::AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Cambia por tu región de S3 si es otra

      - name: Sincronizar con S3
        run: |
          aws s3 sync ./dist s3://posbarlacteo-manuel-2026.s3-website-us-east-1.amazonaws.com --delete