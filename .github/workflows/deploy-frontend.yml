name: Deploy Frontend to EC2 with Docker Hub

on:
  push:
    branches:
      - main # Cambia a master si tu rama principal se llama así

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mi-frontend:latest

      - name: Desplegar en EC2 de AWS Academy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_FRONTEND_USER }}
          key: ${{ secrets.EC2_FRONTEND_KEY }}
          script: |
            # Descargar la nueva imagen desde Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/mi-frontend:latest
            
            # Detener el contenedor anterior si existe
            docker stop frontend-app || true
            docker rm frontend-app || true
            
            # Correr el contenedor mapeando puertos y añadiendo reinicio automático
            docker run -d -p 80:80 --name frontend-app \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/mi-frontend:latest